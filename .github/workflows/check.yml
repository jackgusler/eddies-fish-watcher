name: Eddie's Stock Check

on:
  schedule:
    - cron: "0 14 * * *"  # 2 PM UTC (10 AM EDT / 9 AM EST)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install requests pypdf pytz

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER || 'https://ntfy.sh' }}
        run: python check.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json stock.txt specials.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update Eddie's stock [skip ci]"
            git push
          else
            echo "Stock files unchanged; nothing to commit."
          fi
